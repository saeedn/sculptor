[pytest]
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning:wandb.*:
    ignore::DeprecationWarning:graphql.*:
    ignore::DeprecationWarning:notebook.*:
    ignore::DeprecationWarning:nptyping.*:
    ignore::DeprecationWarning:starlette.*:
    ignore::DeprecationWarning:uvicorn.*:
    ignore::DeprecationWarning:websockets.*:
    ignore:.*record_property is incompatible with junit_family.*::pytest.PytestWarning
markers =
    electron: Launch-mode filter — test requires --sculptor-launch-mode=electron
    electron_custom_command: Launch-mode filter — test requires --sculptor-launch-mode=electron-custom-command (Electron with SCULPTOR_CUSTOM_BACKEND_CMD; uploads use HTTP instead of IPC)
    packaged_electron: Launch-mode filter — test requires --sculptor-launch-mode=packaged-electron. Must be combined with @release.
    browser_and_electron: Tests that run in both browser and Electron modes
    release: CI-pipeline opt-in — test runs against the packaged app in the release pipeline (no FakeClaude available)
    user_story: makes a note about the user story that is implemented by the test
    stub_dependency: stub an external dependency (e.g. git, claude) with a fake binary
    real_claude: tests that hit the real Claude API (excluded from CI)
    custom_sculptor_folder: provide a populator callable for the per-test sculptor folder (read by _extract_marker_arg in sculptor/testing/resources.py)
    real_pi: tests that hit a real pi binary + real upstream model (excluded from CI)


python_files = *_test.py *_tests.py test_*.py *_benchmarks.py
python_classes = Test* Benchmark*
python_functions = test_* benchmark_*


addopts =
    --ignore=quarantine
    --ignore-glob=**/test_data/**
    --ignore=_vendor
    --ignore=build
    # The foundation/ subtree (the former imbue_core library) runs as its own pytest invocation
    # (`just test-unit-foundation`) with its own rootdir/pytest.ini, so exclude it from backend runs.
    --ignore-glob=**/foundation/**
    --import-mode=importlib

    # These options are for pytest-playwright
    --browser=chromium
    --tracing=retain-on-failure
    # End pytest-playwright options

    # These options are for pytest-performancetotal
    --performance-results-dir=performance_results
    --performance-recent-days=7

norecursedirs = quarantine,_vendor
